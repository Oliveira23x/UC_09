<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/global.css" />
    <script src="../../js/produtos/list.js" defer></script>
    <script src="../../js/config.js"></script>
    <!--Aqui é onde colocamos o link para o arquivo JavaScript que contém a função carregarProdutos, que será responsável por buscar os dados dos produtos na API e exibi-los na tabela. O atributo defer garante que o script seja executado somente após o carregamento completo do HTML.-->
    <title>Produtos</title>
  </head>
  <body>
    <header>
      <h1>Controle de Estoque</h1>
      <nav>
        <a href="../../index.html">Home</a>
        <a href="index.html">Produtos</a>
      </nav>
    </header>

    <main>
      <h2>Produtos</h2>
      <a href="#">Novo Produto</a>

      <table>
        <!--Cabeçalho-->
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>QuantidadeEstoque</th>
            <th>Fornecedor ID</th>
            <th>Ações</th>
          </tr>
        </thead>

        <!--Corpo da Tabela-->
        <tbody id="tabela-produtos"></tbody>
      </table>
    </main>
  </body>
</html>
